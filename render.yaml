services:
  - type: web
    name: invoiceflow-backend
    env: node
    rootDir: server
    buildCommand: npm install && npm run deploy:build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22.22.0
      - key: NODE_ENV
        value: production
      - key: CLIENT_URLS
        value: https://invoice-flow-client.vercel.app
