name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: invoiceflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d invoiceflow_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/invoiceflow_test?schema=public
      JWT_SECRET: test-jwt-secret-for-ci
      JWT_REFRESH_SECRET: test-refresh-secret-for-ci

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version-file: '.node-version'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Setup test environment variables
      run: |
        echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/invoiceflow_test?schema=public" >> $GITHUB_ENV
        echo "JWT_SECRET=test-jwt-secret-for-ci" >> $GITHUB_ENV
        echo "JWT_REFRESH_SECRET=test-refresh-secret-for-ci" >> $GITHUB_ENV

    - name: Generate Prisma client
      run: pnpm prisma generate
      working-directory: ./server

    - name: Run database migrations
      run: pnpm prisma migrate deploy
      working-directory: ./server

    - name: Run tests
      run: pnpm test
      working-directory: ./server

    - name: Run test coverage
      run: pnpm test:coverage
      working-directory: ./server

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        file: ./server/coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
